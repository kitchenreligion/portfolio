<style>
  .loading {
    opacity: 0;
    transition: opacity 0.3s ease-in;
  }
  .loaded {
    opacity: 1;
  }
</style>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const grid = document.querySelector(".mm-columns");
    if (!grid) return;

    const masonry = new Masonry(grid, {
      itemSelector: ".mm-columns__item",
      gutter: 10,
      initLayout: false
    });

    let layoutScheduled = false;
    function scheduleLayout() {
      if (!layoutScheduled) {
        layoutScheduled = true;
        requestAnimationFrame(() => {
          masonry.layout();
          layoutScheduled = false;
        });
      }
    }

    function handleImageLoad(img) {
      img.classList.add('loaded');
      scheduleLayout();
    }

    document.querySelectorAll('.mm-columns__img').forEach(img => {
      img.classList.add('loading');
      if (img.complete) {
        handleImageLoad(img);
      } else {
        const onReady = () => {
          handleImageLoad(img);
          img.removeEventListener('load', onReady);
          img.removeEventListener('error', onReady);
        };
        img.addEventListener('load', onReady);
        img.addEventListener('error', onReady);
      }
    });

    masonry.layout();
  });
</script>

<div class="mm-columns">
  {% for item in site.data.index %}
  <div class="mm-columns__item">
    <a href="{{ item.src_url }}" target="_blank">
      <img
        class="mm-columns__img"
        src="{{ item.src_url }}"
        alt="{{ item.name }}"
        loading="lazy"
      />
    </a>
    <div class="overlay">{{ item.name }}</div>
  </div>
  {% endfor %}
</div>
