<style>
  .mm-columns__item {
    cursor: pointer;
  }

  .mm-columns__item:hover .mm-columns__img {
    transform: scale(1.03);
    transition: transform 0.3s ease;
  }

  .mm-columns__img {
    transition: transform 0.3s ease;
    display: block;
  }

  .gallery-wrap {
    position: relative;
    min-height: 200px;
  }

  .gallery-wrap .mm-columns {
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .gallery-wrap.gallery-ready .mm-columns {
    opacity: 1;
  }

  .gallery-spinner {
    position: absolute;
    top: 120px;
    left: 50%;
    transform: translateX(-50%);
    width: 24px;
    height: 24px;
    border: 2px solid rgba(0, 0, 0, 0.1);
    border-top-color: rgba(0, 0, 0, 0.35);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }

  .gallery-wrap.gallery-ready .gallery-spinner {
    display: none;
  }

  @keyframes spin {
    to { transform: translateX(-50%) rotate(360deg); }
  }

  /* Lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.93);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .lightbox.open { display: flex; }

  .lightbox__img {
    max-width: 90vw;
    max-height: 85vh;
    object-fit: contain;
  }

  .lightbox__close,
  .lightbox__nav {
    position: fixed;
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    opacity: 0.6;
    line-height: 1;
    padding: 16px;
  }
  .lightbox__close:hover,
  .lightbox__nav:hover { opacity: 1; }

  .lightbox__close {
    top: 16px;
    right: 16px;
    font-size: 28px;
  }

  .lightbox__nav {
    top: 50%;
    transform: translateY(-50%);
    font-size: 36px;
  }
  .lightbox__prev { left: 8px; }
  .lightbox__next { right: 8px; }

  .lightbox__footer {
    position: fixed;
    bottom: 20px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    color: rgba(255, 255, 255, 0.6);
    font-size: 13px;
    letter-spacing: 0.05em;
    pointer-events: none;
  }
</style>

<div id="lightbox" class="lightbox" role="dialog" aria-modal="true">
  <button class="lightbox__close" id="lightbox-close" aria-label="Close">&#x2715;</button>
  <button class="lightbox__nav lightbox__prev" id="lightbox-prev" aria-label="Previous">&#x2039;</button>
  <img class="lightbox__img" id="lightbox-img" src="" alt="" />
  <button class="lightbox__nav lightbox__next" id="lightbox-next" aria-label="Next">&#x203a;</button>
  <div class="lightbox__footer">
    <span id="lightbox-caption"></span>
    <span id="lightbox-counter"></span>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const items = Array.from(document.querySelectorAll('.mm-columns__item'));
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lightbox-img');
    const lbCaption = document.getElementById('lightbox-caption');
    const lbCounter = document.getElementById('lightbox-counter');
    let current = 0;

    const wrap = document.querySelector('.gallery-wrap');
    const THRESHOLD = Math.min(8, items.length);
    let loadedCount = 0;

    function revealGallery() {
      wrap.classList.add('gallery-ready');
    }

    const timeout = setTimeout(revealGallery, 3000);

    items.forEach(item => {
      const img = item.querySelector('.mm-columns__img');
      const onReady = () => {
        img.removeEventListener('load', onReady);
        img.removeEventListener('error', onReady);
        loadedCount++;
        if (loadedCount >= THRESHOLD) {
          clearTimeout(timeout);
          revealGallery();
        }
      };
      if (img.complete) {
        loadedCount++;
        if (loadedCount >= THRESHOLD) revealGallery();
      } else {
        img.addEventListener('load', onReady);
        img.addEventListener('error', onReady);
      }
    });

    function openLightbox(index) {
      current = (index + items.length) % items.length;
      const img = items[current].querySelector('.mm-columns__img');
      lbImg.src = img.src;
      lbImg.alt = img.alt;
      lbCaption.textContent = img.alt;
      lbCounter.textContent = (current + 1) + ' / ' + items.length;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      lbImg.src = '';
    }

    items.forEach((item, i) => {
      item.querySelector('a').addEventListener('click', e => {
        e.preventDefault();
        openLightbox(i);
      });
    });

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox-prev').addEventListener('click', () => openLightbox(current - 1));
    document.getElementById('lightbox-next').addEventListener('click', () => openLightbox(current + 1));

    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') openLightbox(current - 1);
      if (e.key === 'ArrowRight') openLightbox(current + 1);
    });

    let touchStartX = 0;
    lightbox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
    lightbox.addEventListener('touchend', e => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) > 50) openLightbox(current + (dx < 0 ? 1 : -1));
    });
  });
</script>

<div class="gallery-wrap">
<div class="gallery-spinner"></div>
<div class="mm-columns">
  {% for item in site.data.index %}
  <div class="mm-columns__item">
    <a href="{{ item.src_url }}">
      <img
        class="mm-columns__img"
        src="{{ item.src_url }}"
        alt="{{ item.name }}"
        loading="lazy"
      />
    </a>
    <div class="overlay">{{ item.name }}</div>
  </div>
  {% endfor %}
</div>
</div>
