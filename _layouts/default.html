<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title }}{% if page.subtitle %} — {{ page.subtitle }}{% endif %}</title>
    <meta name="description" content="{{ page.subtitle | default: page.title }}" />
    <link rel="canonical" href="https://kitchenreligion.co.uk{{ page.url }}" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kitchen Religion" />
    <meta property="og:title" content="{{ page.title }}{% if page.subtitle %} — {{ page.subtitle }}{% endif %}" />
    <meta property="og:description" content="{{ page.subtitle | default: page.title }}" />
    <meta property="og:url" content="https://kitchenreligion.co.uk{{ page.url }}" />

    <meta property="og:image:width" content="1191" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ page.title }}{% if page.subtitle %} — {{ page.subtitle }}{% endif %}" />
    <meta name="twitter:description" content="{{ page.subtitle | default: page.title }}" />
    <meta name="twitter:image" content="https://lh3.googleusercontent.com/pw/AP1GczNHmQC1NBi0qpBnP2JXILIWUcLTQrQTZu9XqRlg17K6u_VGyg2iB9XCEK7u1UUeXd1ZXQPOlG6U3N8m60ERn0veBta6RWMRubsG9kfcG5IXk67ibQ8rgZWOyYUrffbG1HaxEAXieFlR7V6N2ylxXVef=w1191-h1488-s-no?authuser=0" />

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Stephanie",
      "jobTitle": "Food Photographer and Stylist",
      "url": "https://kitchenreligion.co.uk",
      "email": "kitchenreligionphoto@gmail.com",
      "knowsAbout": ["food photography", "food styling", "recipe development", "content creation"]
    }
    </script>

    <link href="/assets/css/styles.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css?family=Roboto:500,900,100,300,700,400"
      rel="stylesheet"
      type="text/css"
    />
  </head>
  <body>
    <div class="container">
      <h1>{{ page.title }}</h1>
      <h2>{{ page.subtitle }}</h2>
      {% include navigation.html %} {{ content }}
      <div class="push"></div>
    </div>
    <footer class="footer">
      <small
        >©<span id="footer-year"></span> kitchenreligion.co.uk - All Rights
        Reserved</small
      >
      <script>
        document.getElementById("footer-year").textContent =
          new Date().getFullYear();
      </script>
    </footer>

</html>
