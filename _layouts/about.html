---
layout: default
---

<style>
  .about-layout {
    display: flex;
    gap: 48px;
    align-items: flex-start;
    max-width: 900px;
    margin: 0 auto;
    color: #131215;
  }
  .about-photo {
    width: 300px;
    flex-shrink: 0;
    object-fit: cover;
    border-radius: 50%;
    aspect-ratio: 1 / 1;
  }
  .about-text {
    text-align: left;
    line-height: 1.8;
    font-size: 15px;
    color: #2a2a2a;
  }
  .about-text p {
    margin: 0 0 1.2em;
  }
  @media (max-width: 600px) {
    .about-layout {
      flex-direction: column;
      align-items: center;
    }
    .about-photo {
      width: 200px;
    }
  }
</style>

<div class="about-layout">
  <img
    src="{{ site.data.about.photo_url | default: '/assets/images/about.jpg' }}"
    alt="Stephanie"
    class="about-photo"
  />
  <div class="about-text">{{content}}</div>
</div>
